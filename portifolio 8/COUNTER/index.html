<!DOCTYPE html>
<html>
<head>
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="counter">0</div>
    <button onclick="count++">➕</button>
    <button onclick="count-- || (count=0)">➖</button>
    <button onclick="count=0">🔄</button>
    <script src="script.js"></script>
</body>
</html>
